<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Справочник Таро</title>
  <style>
    :root{color-scheme:dark;--bg:#08060d;--panel:#15101f;--panel2:#20192a;--line:rgba(236,211,151,.22);--text:#f6f1e8;--muted:#b9adbf;--gold:#d9aa4f;--gold2:#f2d27b;--shadow:0 18px 60px rgba(0,0,0,.45);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}html,body{min-height:100%;margin:0;background:radial-gradient(circle at top,#211631 0,#08060d 48%,#050408 100%);color:var(--text);overflow-x:hidden}body{padding:16px;padding-bottom:calc(18px + env(safe-area-inset-bottom));-webkit-tap-highlight-color:transparent}.app{width:min(1180px,100%);margin:0 auto}.top{border:1px solid var(--line);border-radius:26px;background:rgba(18,14,27,.92);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}h1{margin:0 0 14px;font-size:clamp(30px,8vw,54px);line-height:1}.controls{display:grid;grid-template-columns:1.4fr repeat(3,minmax(145px,.55fr));gap:10px}.controls input,.controls select{width:100%;border:1px solid rgba(255,255,255,.14);background:#211b2b;color:var(--text);border-radius:18px;padding:14px 16px;font-size:18px;outline:none}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}.btn{border:1px solid rgba(255,255,255,.14);background:#241e2e;color:var(--text);border-radius:999px;padding:11px 15px;font-size:16px;font-weight:700;cursor:pointer;white-space:nowrap}.btn.primary{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#24170b;border-color:rgba(255,255,255,.25)}.meta{color:var(--muted);font-size:15px;margin:0 0 10px;padding:0 4px}.grid-wrap{border:1px solid var(--line);border-radius:26px;background:rgba(11,9,17,.74);padding:14px;min-height:240px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:12px;align-items:start}.card-tile{width:100%;max-width:150px;justify-self:center;border:1px solid rgba(255,255,255,.12);border-radius:18px;background:linear-gradient(180deg,#211a29,#111018);padding:9px;box-shadow:0 10px 30px rgba(0,0,0,.24);cursor:pointer}.thumb-box{aspect-ratio:3/5;border-radius:13px;background:#0c0912;display:grid;place-items:center;overflow:hidden;border:1px solid rgba(255,255,255,.08)}.thumb-box img{width:100%;height:100%;object-fit:contain;display:block}.tile-title{font-size:15px;line-height:1.05;text-align:center;margin-top:8px;min-height:32px}.placeholder{display:grid;place-items:center;text-align:center;color:#c7b9c9;font-size:12px;padding:8px}.modal,.image-modal{position:fixed;inset:0;background:rgba(4,3,7,.82);z-index:20;display:none;align-items:center;justify-content:center;padding:14px;touch-action:none}.modal.open,.image-modal.open{display:flex}.sheet{width:min(940px,100%);max-height:calc(100dvh - 28px);overflow:auto;overscroll-behavior:contain;border:1px solid var(--line);border-radius:28px;background:#120f19;box-shadow:var(--shadow);padding:16px;touch-action:pan-y}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;background:#120f19;padding-bottom:10px;z-index:2}.modal-title{font-size:24px;font-weight:900}.close{width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.16);background:#24202d;color:var(--text);font-size:24px}.detail{display:grid;grid-template-columns:minmax(220px,320px) 1fr;gap:18px}.detail-img{width:100%;max-height:70dvh;object-fit:contain;border-radius:18px;background:#08060d;cursor:zoom-in;border:1px solid rgba(255,255,255,.12)}.chips{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}.chip{font-size:13px;color:#1b1208;background:var(--gold2);padding:5px 9px;border-radius:999px;font-weight:800}.section{border-top:1px solid rgba(255,255,255,.1);padding-top:11px;margin-top:11px}.section h3{font-size:16px;margin:0 0 5px;color:#f2d27b}.section p{font-size:16px;line-height:1.45;margin:0;color:#eee7f1}.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px}.nav-row .btn{flex:1}.image-view{position:relative;width:100%;height:100%;display:grid;place-items:center}.image-view img{max-width:96vw;max-height:92dvh;object-fit:contain;border-radius:18px;box-shadow:var(--shadow)}.image-close{position:absolute;top:calc(12px + env(safe-area-inset-top));right:14px}.image-name{position:absolute;left:50%;bottom:calc(14px + env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 14px;font-weight:800}.side-nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:64px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.34);color:#fff;font-size:32px}.side-nav.prev{left:10px}.side-nav.next{right:10px}@media (max-width:760px){body{padding:12px 10px}.top{padding:14px;border-radius:22px}.controls{grid-template-columns:1fr}.controls input,.controls select{font-size:18px;padding:13px 14px}.actions{gap:8px}.btn{font-size:15px;padding:10px 12px}.grid-wrap{padding:10px;border-radius:22px}.grid{grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:9px}.card-tile{max-width:104px;border-radius:15px;padding:7px}.tile-title{font-size:13px;min-height:28px}.detail{grid-template-columns:1fr}.sheet{padding:13px;border-radius:22px}.detail-img{max-height:54dvh}.modal-title{font-size:21px}.section p{font-size:15px}.side-nav{display:none}}@media (max-width:390px){.grid{grid-template-columns:repeat(auto-fill,minmax(72px,1fr))}.card-tile{max-width:96px}.tile-title{font-size:12px}.btn{font-size:14px;padding:9px 10px}}
  </style>
</head>
<body>
<div class="app">
  <section class="top">
    <h1>Справочник Таро</h1>
    <div class="controls">
      <input id="search" placeholder="Поиск: Мир, жезлы, выбор, деньги">
      <select id="suit"><option value="all">Все карты</option><option value="major">Старшие арканы</option><option value="wands">Жезлы</option><option value="cups">Кубки</option><option value="swords">Мечи</option><option value="pentacles">Пентакли</option></select>
      <select id="kind"><option value="all">Все типы</option><option value="aces">Только тузы</option><option value="court">Только двор</option><option value="minor">Младшие</option><option value="major">Старшие</option></select>
      <select id="mode"><option value="compact">Компактно</option><option value="learn">Тренировка</option></select>
    </div>
    <div class="actions">
      <button class="btn" id="training">Тренировка</button>
      <button class="btn" id="random">Случайная</button>
      <button class="btn primary" id="day">Карта дня</button>
    </div>
  </section>
  <p class="meta" id="meta"></p>
  <section class="grid-wrap"><div class="grid" id="grid"></div></section>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"><div class="modal-head"><div class="modal-title" id="modalTitle"></div><button class="close" id="close">×</button></div><div class="detail"><div><img class="detail-img" id="detailImg" alt=""><div class="nav-row"><button class="btn" id="prev">← Предыдущая</button><button class="btn" id="next">Следующая →</button></div></div><div id="detailText"></div></div></div></div>
<div class="image-modal" id="imageModal"><div class="image-view" id="imageView"><button class="close image-close" id="imageClose">×</button><button class="side-nav prev" id="imagePrev">‹</button><img id="fullImg" alt=""><button class="side-nav next" id="imageNext">›</button><div class="image-name" id="imageName"></div></div></div>
<script>
const CARD_ASSET_BASE_URL='https://kostgame.github.io/Tarot/assets/cards/';
const majors=[['major-00-fool','Шут','начало пути, спонтанность, доверие жизни','хаос, риск, наивность'],['major-01-magician','Маг','воля, действие, мастерство, инициатива','манипуляция, расфокус, пустые обещания'],['major-02-high-priestess','Жрица','интуиция, тайна, скрытое знание','закрытость, игнорирование сигналов'],['major-03-empress','Императрица','рост, забота, плодородие, ресурс','излишества, зависимость от комфорта'],['major-04-emperor','Император','структура, власть, границы, порядок','жесткость, контроль, давление'],['major-05-hierophant','Иерофант','традиция, обучение, правила, наставник','догматизм, чужие правила'],['major-06-lovers','Влюбленные','выбор, союз, ценности, притяжение','сомнения, треугольник, несогласованность'],['major-07-chariot','Колесница','рывок, победа, управление, курс','спешка, потеря контроля'],['major-08-strength','Сила','мягкая власть, смелость, самообладание','срыв, неуверенность, подавление'],['major-09-hermit','Отшельник','поиск смысла, пауза, мудрость','изоляция, холодность, застревание'],['major-10-wheel-of-fortune','Колесо Фортуны','поворот, шанс, цикл, перемены','нестабильность, повтор ошибки'],['major-11-justice','Справедливость','баланс, закон, честный итог','перекос, несправедливость'],['major-12-hanged-man','Повешенный','пауза, новый взгляд, отпускание','зависание, жертва без смысла'],['major-13-death','Смерть','завершение, трансформация, переход','сопротивление переменам'],['major-14-temperance','Умеренность','исцеление, мера, согласование','разбалансировка, крайности'],['major-15-devil','Дьявол','привязки, страсть, зависимость, тень','освобождение или отрицание зависимости'],['major-16-tower','Башня','слом старого, правда, резкая перемена','страх перемен, затяжной кризис'],['major-17-star','Звезда','надежда, вдохновение, восстановление','потеря веры, усталость'],['major-18-moon','Луна','туман, страхи, сны, неопределенность','прояснение, выход из иллюзий'],['major-19-sun','Солнце','радость, ясность, успех, открытость','задержка радости, эгоцентризм'],['major-20-judgement','Суд','пробуждение, итог, призвание','самообвинение, страх решения'],['major-21-world','Мир','завершение, цельность, результат','незавершенность, последний шаг']];
const suits={wands:['Жезлов','огонь, воля, действие, страсть'],cups:['Кубков','эмоции, отношения, чувства'],swords:['Мечей','мысли, конфликт, решение'],pentacles:['Пентаклей','деньги, тело, работа, устойчивость']};
const ranks=[['01-ace','Туз','новый импульс','задержанный старт'],['02','Двойка','выбор и баланс','неустойчивость'],['03','Тройка','рост и первые результаты','рассинхрон'],['04','Четверка','стабилизация','застой'],['05','Пятерка','конфликт или кризис','выход из напряжения'],['06','Шестерка','движение к гармонии','долг прошлого'],['07','Семерка','проверка и стратегия','сомнения'],['08','Восьмерка','процесс и ускорение','блокировка'],['09','Девятка','личный итог','усталость или перебор'],['10','Десятка','завершение цикла','перегруз'],['11-page','Паж','ученик, сигнал, интерес','незрелость'],['12-knight','Рыцарь','движение, поступок','импульсивность или торможение'],['13-queen','Королева','зрелое владение энергией','теневая сторона масти'],['14-king','Король','управление энергией','жесткость или слабость контроля']];
const cards=[...majors.map((m,i)=>({id:m[0],name:m[1],suit:'major',kind:'major',file:m[0]+'.jpg',core:m[2],rev:m[3]})),...Object.entries(suits).flatMap(([s,[label,theme]])=>ranks.map((r,idx)=>({id:s+'-'+r[0],name:r[1]+' '+label,suit:s,kind:idx===0?'ace':idx>9?'court':'minor',file:s+'-'+r[0]+'.jpg',core:r[2]+' через тему масти: '+theme,rev:r[3]+' в сфере '+theme})))];
let filtered=[...cards],current=0,training=false;const $=id=>document.getElementById(id);function imgUrl(c){return CARD_ASSET_BASE_URL+c.file}function onImgError(img,c){console.warn('Не загрузилась карта',c.name,img.src);img.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder',textContent:'Нет изображения\n'+c.name}))}function render(){const q=$('search').value.trim().toLowerCase(),s=$('suit').value,k=$('kind').value;filtered=cards.filter(c=>(s==='all'||c.suit===s)&&(k==='all'||(k==='aces'?c.kind==='ace':k==='court'?c.kind==='court':k==='minor'?c.suit!=='major':k==='major'?c.suit==='major':true))&&(!q||(c.name+' '+c.core+' '+c.rev).toLowerCase().includes(q)));$('meta').textContent='Показано '+filtered.length+' из '+cards.length+' карт';$('grid').innerHTML='';filtered.forEach((c,i)=>{const tile=document.createElement('button');tile.className='card-tile';tile.innerHTML='<div class="thumb-box"><img src="'+imgUrl(c)+'" alt="'+c.name+'"></div><div class="tile-title">'+c.name+'</div>';tile.querySelector('img').onerror=e=>onImgError(e.currentTarget,c);tile.onclick=()=>openCard(i);$('grid').append(tile)})}function detailHtml(c){const hidden=training||$('mode').value==='learn';return '<div class="chips"><span class="chip">'+(c.suit==='major'?'Старший аркан':suits[c.suit][0])+'</span><span class="chip">'+(c.kind==='court'?'Двор':c.kind==='ace'?'Туз':c.kind)+'</span></div>'+(hidden?'<div class="section"><h3>Тренировка</h3><p>Сначала попробуй сам назвать суть карты, затем нажми кнопку ниже.</p><button class="btn primary" onclick="training=false;showCurrent()">Показать трактовку</button></div>':'')+'<div class="section"><h3>Суть</h3><p>'+c.core+'.</p></div><div class="section"><h3>Перевернутое</h3><p>'+c.rev+'.</p></div><div class="section"><h3>Отношения</h3><p>Показывает, как энергия карты проявляется в близости, ожиданиях, выборе и честности между людьми.</p></div><div class="section"><h3>Работа и деньги</h3><p>Смотри на карту как на подсказку о ресурсах, темпе, риске, договоренностях и готовности действовать.</p></div><div class="section"><h3>Совет</h3><p>Выбери один ясный шаг: не пытайся вытянуть из карты весь прогноз сразу.</p></div><div class="section"><h3>Как запомнить</h3><p>'+c.name+' это образ: '+c.core+'.</p></div>'}function openCard(i){current=i;showCurrent();$('modal').classList.add('open')}function showCurrent(){const c=filtered[current]||cards[0];$('modalTitle').textContent=c.name;$('detailImg').src=imgUrl(c);$('detailImg').alt=c.name;$('detailImg').onerror=e=>onImgError(e.currentTarget,c);$('detailImg').onclick=openImage;$('detailText').innerHTML=detailHtml(c)}function step(d){if(!filtered.length)return;current=(current+d+filtered.length)%filtered.length;showCurrent();if($('imageModal').classList.contains('open'))showImage()}function openImage(){$('imageModal').classList.add('open');showImage()}function showImage(){const c=filtered[current]||cards[0];$('fullImg').src=imgUrl(c);$('fullImg').alt=c.name;$('imageName').textContent=c.name}$('close').onclick=()=>$('modal').classList.remove('open');$('prev').onclick=()=>step(-1);$('next').onclick=()=>step(1);$('imageClose').onclick=()=>$('imageModal').classList.remove('open');$('imagePrev').onclick=()=>step(-1);$('imageNext').onclick=()=>step(1);$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.remove('open')};$('imageModal').onclick=e=>{if(e.target===$('imageModal')||e.target===$('imageView'))$('imageModal').classList.remove('open')};['search','suit','kind','mode'].forEach(id=>$(id).addEventListener('input',render));$('training').onclick=()=>{training=!training;if($('modal').classList.contains('open'))showCurrent()};$('random').onclick=()=>openCard(Math.floor(Math.random()*filtered.length));$('day').onclick=()=>openCard(Math.floor(Math.random()*cards.length));document.addEventListener('keydown',e=>{if(e.key==='Escape'){$('imageModal').classList.remove('open');$('modal').classList.remove('open')}if(e.key==='ArrowLeft')step(-1);if(e.key==='ArrowRight')step(1)});function swipe(el,cb){let x=0,y=0,t=false;el.addEventListener('touchstart',e=>{const p=e.changedTouches[0];x=p.clientX;y=p.clientY;t=true},{passive:true});el.addEventListener('touchend',e=>{if(!t)return;const p=e.changedTouches[0],dx=p.clientX-x,dy=p.clientY-y;t=false;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy))cb(dx<0?'left':'right');else if(dy>70&&Math.abs(dy)>Math.abs(dx))cb('down')},{passive:true})}swipe($('sheet'),d=>{if(d==='left')step(1);if(d==='right')step(-1);if(d==='down')$('modal').classList.remove('open')});swipe($('imageView'),d=>{if(d==='left')step(1);if(d==='right')step(-1);if(d==='down')$('imageModal').classList.remove('open')});render();
</script>
</body>
</html>
