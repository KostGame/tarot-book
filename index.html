<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Справочник Таро</title><style>:root{color-scheme:dark;--line:rgba(236,211,151,.22);--text:#f6f1e8;--muted:#b9adbf;--gold:#d9aa4f;--gold2:#f2d27b;--shadow:0 18px 60px rgba(0,0,0,.45);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#211631 0,#08060d 48%,#050408 100%);color:var(--text);overflow-x:hidden}body{--tile-min:108px;--tile-max:128px;--thumb:150px;--title:15px;padding:16px 16px 30px}body[data-density=tiny]{--tile-min:86px;--tile-max:104px;--thumb:124px;--title:13px}body[data-density=normal]{--tile-min:132px;--tile-max:156px;--thumb:188px;--title:16px}.app{width:min(1180px,100%);margin:0 auto}.top,.grid-wrap,.sources,.sheet,.help-panel{border:1px solid var(--line);border-radius:26px;background:rgba(18,14,27,.9);box-shadow:var(--shadow)}.top{padding:18px;margin-bottom:10px}h1{margin:0 0 14px;font-size:clamp(30px,8vw,54px);line-height:1}.controls{display:grid;grid-template-columns:1.4fr repeat(5,minmax(132px,.55fr));gap:10px}.controls input,.controls select{width:100%;border:1px solid rgba(255,255,255,.14);background:#211b2b;color:var(--text);border-radius:18px;padding:13px 14px;font-size:16px;outline:none}.actions,.quickbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn,.qbtn{border:1px solid rgba(255,255,255,.14);background:#241e2e;color:var(--text);border-radius:999px;padding:10px 13px;font-size:15px;font-weight:800;cursor:pointer;white-space:nowrap}.btn.primary,.btn.active,.qbtn.active{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#24170b}.quickbar{position:sticky;top:0;z-index:10;overflow-x:auto;flex-wrap:nowrap;padding:8px;margin:0 0 10px;background:rgba(8,6,13,.86);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:999px;box-shadow:0 10px 30px rgba(0,0,0,.25)}.qbtn{min-width:42px;height:38px;padding:0 10px;font-size:19px;display:grid;place-items:center}.meta{color:var(--muted);font-size:15px;margin:0 0 10px;padding:0 4px}.grid-wrap{background:rgba(11,9,17,.74);padding:14px;min-height:240px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--tile-min),1fr));gap:12px;align-items:start;justify-items:center}.card-tile{position:relative;width:100%;max-width:var(--tile-max);border:1px solid rgba(255,255,255,.12);border-radius:18px;background:linear-gradient(180deg,#211a29,#111018);padding:9px;box-shadow:0 10px 30px rgba(0,0,0,.24);cursor:pointer;color:var(--text);overflow:hidden}.card-tile.favorite{border-color:rgba(242,210,123,.58)}.star{position:absolute;top:7px;right:7px;z-index:3;width:30px;height:30px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(7,5,11,.72);color:#c7b9c9;font-size:19px;line-height:1}.star.on{color:#ffd86e;background:rgba(65,44,9,.84)}.thumb-box{height:var(--thumb);border-radius:13px;background:#0c0912;display:grid;place-items:center;overflow:hidden;border:1px solid rgba(255,255,255,.08)}.thumb-box img{width:100%;height:100%;object-fit:contain;display:block}.tile-title{font-size:var(--title);line-height:1.08;text-align:center;margin-top:8px;min-height:34px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}.modal,.image-modal,.help-modal{position:fixed;inset:0;background:rgba(4,3,7,.82);z-index:20;display:none;align-items:center;justify-content:center;padding:14px;touch-action:none}.modal.open,.image-modal.open,.help-modal.open{display:flex}.sheet,.help-panel{width:min(940px,100%);max-height:calc(100dvh - 28px);overflow:auto;overscroll-behavior:contain;border-radius:28px;background:#120f19;padding:16px;touch-action:pan-y}.modal-head,.help-head{display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;background:#120f19;padding-bottom:10px;z-index:2}.modal-title,.help-title{font-size:24px;font-weight:900}.close{width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.16);background:#24202d;color:var(--text);font-size:24px}.detail{display:grid;grid-template-columns:minmax(220px,320px) 1fr;gap:18px}.detail-img{width:100%;max-height:70dvh;object-fit:contain;border-radius:18px;background:#08060d;cursor:zoom-in;border:1px solid rgba(255,255,255,.12)}.chips{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}.chip{font-size:13px;color:#1b1208;background:var(--gold2);padding:5px 9px;border-radius:999px;font-weight:800}.section{border-top:1px solid rgba(255,255,255,.1);padding-top:11px;margin-top:11px}.section h3{font-size:16px;margin:0 0 5px;color:#f2d27b}.section p{font-size:16px;line-height:1.48;margin:0;color:#eee7f1}.extended,.help-item{border:1px solid rgba(242,210,123,.35);background:rgba(242,210,123,.07);border-radius:18px;margin:0 0 10px;overflow:hidden}.extended summary,.help-item summary{list-style:none;cursor:pointer;padding:12px 14px;color:#f2d27b;font-weight:900;font-size:16px}.extended summary::-webkit-details-marker,.help-item summary::-webkit-details-marker{display:none}.summary-row{display:grid;grid-template-columns:110px 1fr auto;gap:8px;align-items:center}.assoc{color:#fff;font-weight:900}.about{color:var(--muted);font-size:14px;font-weight:700}.chev{color:var(--muted);font-size:13px}.extended-body,.help-body{padding:0 14px 14px}.extended-body p,.help-body p{font-size:15px;line-height:1.55;margin:0 0 12px;color:#f1e9f4}.quote{border-left:3px solid var(--gold2);padding:9px 12px;background:rgba(255,255,255,.04);border-radius:0 12px 12px 0;font-weight:800}.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:14px}.nav-row .btn{flex:1}.image-view{position:relative;width:100%;height:100%;display:grid;place-items:center}.image-view img{max-width:96vw;max-height:92dvh;object-fit:contain;border-radius:18px;box-shadow:var(--shadow);cursor:pointer}.image-close{position:absolute;top:calc(12px + env(safe-area-inset-top));right:14px}.image-name{position:absolute;left:50%;bottom:calc(14px + env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 14px;font-weight:800}.side-nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:64px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.34);color:#fff;font-size:32px}.side-nav.prev{left:10px}.side-nav.next{right:10px}.sources{margin:18px 0 0;padding:16px;color:var(--muted);font-size:14px;line-height:1.45}.sources h2{margin:0 0 8px;color:var(--text);font-size:20px}.sources a{color:#f2d27b;text-decoration:none}@media(max-width:900px){.controls{grid-template-columns:1fr 1fr}}@media(max-width:760px){body{--tile-min:96px;--tile-max:128px;--thumb:150px;--title:15px;padding:12px 10px}body[data-density=tiny]{--tile-min:82px;--tile-max:108px;--thumb:126px;--title:13px}body[data-density=normal]{--tile-min:128px;--tile-max:160px;--thumb:186px;--title:16px}.top{padding:14px;border-radius:22px}.controls{grid-template-columns:1fr}.controls input,.controls select{font-size:17px;padding:12px 13px}.btn{font-size:14px;padding:9px 11px}.grid-wrap{padding:10px;border-radius:22px}.grid{gap:10px}.detail{grid-template-columns:1fr}.sheet,.help-panel{padding:13px 13px calc(94px + env(safe-area-inset-bottom));border-radius:22px}.modal .close{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));top:auto;z-index:60;width:58px;height:58px;font-size:34px;line-height:1;background:linear-gradient(135deg,rgba(60,48,75,.96),rgba(30,24,38,.96));border-color:rgba(255,255,255,.22);box-shadow:0 14px 42px rgba(0,0,0,.48)}.detail-img{max-height:54dvh}.modal-title{font-size:21px;padding-right:58px}.side-nav{display:none}.quickbar{border-radius:20px}.qbtn{min-width:38px}.summary-row{grid-template-columns:88px 1fr auto}}</style></head><body data-density="compact"><div class="app"><section class="top"><h1>Справочник Таро</h1><div class="controls"><input id="search" placeholder="Поиск: Мир, жезлы, выбор, деньги"><select id="suit"><option value="all">Все карты</option><option value="major">Старшие арканы</option><option value="wands">Жезлы</option><option value="cups">Кубки</option><option value="swords">Мечи</option><option value="pentacles">Пентакли</option></select><select id="kind"><option value="all">Все типы</option><option value="favorites">Избранное</option><option value="aces">Только тузы</option><option value="court">Только двор</option><option value="minor">Младшие</option><option value="major">Старшие</option></select><select id="rank"><option value="all">Все ранги</option><option value="01">Все тузы</option><option value="02">Все двойки</option><option value="03">Все тройки</option><option value="04">Все четверки</option><option value="05">Все пятерки</option><option value="06">Все шестерки</option><option value="07">Все семерки</option><option value="08">Все восьмерки</option><option value="09">Все девятки</option><option value="10">Все десятки</option><option value="11">Все пажи</option><option value="12">Все рыцари</option><option value="13">Все королевы</option><option value="14">Все короли</option></select><select id="image"><option value="all">Все образы</option><option value="start">Начало / шанс</option><option value="choice">Выбор / баланс</option><option value="conflict">Конфликт / кризис</option><option value="movement">Движение / путь</option><option value="pause">Пауза / ожидание</option><option value="resource">Ресурс / деньги</option><option value="love">Отношения / чувства</option><option value="power">Власть / контроль</option><option value="shadow">Тень / страх</option><option value="result">Итог / завершение</option></select><select id="density"><option value="tiny">Очень компактно</option><option value="compact" selected>Компактно</option><option value="normal">Крупнее</option></select></div><div class="actions"><button class="btn" id="training">Тренировка</button><button class="btn" id="random">Случайная</button><button class="btn primary" id="day">Карта дня</button><button class="btn" id="suitHelp">Справка по мастям</button><button class="btn" id="rankHelp">Справка по рангам</button></div></section><div class="quickbar" id="quickbar"></div><p class="meta" id="meta"></p><section class="grid-wrap"><div class="grid" id="grid"></div></section><footer class="sources"><h2>Источники</h2><p>Расширенные описания переработаны и написаны заново по мотивам открытых справочных материалов о колоде Уэйта и системе арканов. Источники: <a href="https://ru.wikipedia.org/wiki/Карты_таро" target="_blank" rel="noopener">«Карты таро», Wikipedia</a>, <a href="https://ru.wikipedia.org/wiki/Колода_Таро" target="_blank" rel="noopener">«Колода Таро», Wikipedia</a>, <a href="https://en.wikipedia.org/wiki/Rider%E2%80%93Waite_Tarot" target="_blank" rel="noopener">Rider–Waite Tarot</a>, <a href="https://en.wikipedia.org/wiki/Minor_Arcana" target="_blank" rel="noopener">Minor Arcana</a>, <a href="https://labyrinthos.co/blogs/tarot-card-meanings-list" target="_blank" rel="noopener">Labyrinthos</a>, <a href="https://www.biddytarot.com/tarot-card-meanings/" target="_blank" rel="noopener">Biddy Tarot</a>.</p></footer></div><div class="modal" id="modal"><div class="sheet" id="sheet"><div class="modal-head"><div class="modal-title" id="modalTitle"></div><button class="close" id="close">×</button></div><div class="detail"><div><img class="detail-img" id="detailImg" alt=""><div class="nav-row"><button class="btn" id="prev">←</button><button class="btn" id="modalFav">☆</button><button class="btn" id="next">→</button></div></div><div id="detailText"></div></div></div></div><div class="image-modal" id="imageModal"><div class="image-view" id="imageView"><button class="close image-close" id="imageClose">×</button><button class="side-nav prev" id="imagePrev">‹</button><img id="fullImg" alt=""><button class="side-nav next" id="imageNext">›</button><div class="image-name" id="imageName"></div></div></div><div class="help-modal" id="helpModal"><div class="help-panel"><div class="help-head"><div class="help-title" id="helpTitle"></div><button class="close" id="helpClose">×</button></div><div id="helpBody"></div></div></div><script>const CARD_ASSET_BASE_URL='https://kostgame.github.io/Tarot/assets/cards/';const cards=[{"id":"major-00-fool","name":"Шут","suit":"major","kind":"major","rank":"major","rankName":"Старший","assoc":"Начало","about":"новый путь, риск, доверие","image":"start","file":"major-00-fool.jpg","core":"новый путь, риск, доверие","rev":"хаос, наивность","long":"Шут: начало. Карта показывает архетипический этап пути: новый путь, риск, доверие. Перевернутое положение обычно искажает тему: хаос, наивность.","love":"В отношениях: новый путь, риск, доверие.","work":"В работе: новый путь, риск, доверие.","advice":"Совет: прояви начало осознанно."},{"id":"major-01-magician","name":"Маг","suit":"major","kind":"major","rank":"major","rankName":"Старший","assoc":"Воля","about":"действие, навык, проявление","image":"start","file":"major-01-magician.jpg","core":"действие, навык, проявление","rev":"манипуляция, расфокус","long":"Маг: воля. Карта показывает архетипический этап пути: действие, навык, проявление. Перевернутое положение обычно искажает тему: манипуляция, расфокус.","love":"В отношениях: действие, навык, проявление.","work":"В работе: действие, навык, проявление.","advice":"Совет: прояви воля осознанно."},{"id":"major-02-high-priestess","name":"Жрица","suit":"major","kind":"major","rank":"major","rankName":"Старший","assoc":"Тайна","about":"интуиция, скрытое, пауза","image":"pause","file":"major-02-high-priestess.jpg","core":"интуиция, скрытое, пауза","rev":"закрытость, игнор сигналов","long":"Жрица: тайна. Карта показывает архетипический этап пути: интуиция, скрытое, пауза. Перевернутое положение обычно искажает тему: закрытость, игнор сигналов.","love":"В отношениях: интуиция, скрытое, пауза.","work":"В работе: интуиция, скрытое, пауза.","advice":"Совет: прояви тайна осознанно."},{"id":"major-03-empress","name":"Императрица","suit":"major","kind":"major","rank":"major","rankName":"Старший","assoc":"Рост","about":"забота, плодородие, ресурс","image":"resource","file":"major-03-empress.jpg","core":"забота, плодородие, ресурс","rev":"излишества, зависимость","long":"Императрица: рост. Карта показывает архетипический этап пути: забота, плодородие, ресурс. Перевернутое положение обычно искажает тему: излишества, зависимость.","love":"В отношениях: забота, плодородие, ресурс.","work":"В работе: забота, плодородие, ресурс.","advice":"Совет: прояви рост осознанно."},{"id":"major-04-emperor","name":"Император","suit":"major","kind":"major","rank":"major","rankName":"Старший","assoc":"Порядок","about":"структура, власть, границы","image":"power","file":"major-04-emperor.jpg","core":"структура, власть, границы","rev":"контроль, жесткость","long":"Император: порядок. Карта показывает архетипический этап пути: структура, власть, границы. Перевернутое положение обычно искажает тему: контроль, жесткость.","love":"В отношениях: структура, власть, границы.","work":"В работе: структура, власть, границы.","advice":"Совет: прояви порядок осознанно."},{"id":"major-05-hierophant","name":"Иерофант","suit":"major","kind":"major","rank":"major","rankName":"Старший","assoc":"Традиция","about":"правила, наставник, система","image":"power","file":"major-05-hierophant.jpg","core":"правила, наставник, система","rev":"догма, чужие правила","long":"Иерофант: традиция. Карта показывает архетипический этап пути: правила, наставник, система. Перевернутое положение обычно искажает тему: догма, чужие правила.","love":"В отношениях: правила, наставник, система.","work":"В работе: правила, наставник, система.","advice":"Совет: прояви традиция осознанно."},{"id":"major-06-lovers","name":"Влюбленные","suit":"major","kind":"major","rank":"major","rankName":"Старш ocument.addEventListener('keydown',e=>{if(e.key==='Escape'){$('imageModal').classList.remove('open');$('modal').classList.remove('open');$('helpModal').classList.remove('open')}if(e.key==='ArrowLeft')step(-1);if(e.key==='ArrowRight')step(1)});function swipe(el,cb){let x=0,y=0,t=false;el.addEventListener('touchstart',e=>{const p=e.changedTouches[0];x=p.clientX;y=p.clientY;t=true},{passive:true});el.addEventListener('touchend',e=>{if(!t)return;const p=e.changedTouches[0],dx=p.clientX-x,dy=p.clientY-y;t=false;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy))cb(dx<0?'left':'right')},{passive:true})}swipe($('sheet'),d=>{if(d==='left')step(1);if(d==='right')step(-1)});swipe($('imageView'),d=>{if(d==='left')step(1);if(d==='right')step(-1)});window.revealTraining=revealTraining;window.rememberExtended=rememberExtended;buildQuick();render();</script></body></html>
